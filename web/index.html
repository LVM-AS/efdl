<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EFTA-DL Console</title>
<link rel="stylesheet" href="/styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="/_ds_bundle.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #app-root { height: 100vh; }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel" src="/icons.js"></script>
<script type="text/babel" src="/Dashboard.js"></script>
<script type="text/babel" src="/NewDownload.js"></script>
<script type="text/babel" src="/Files.js"></script>
<script type="text/babel" src="/Conflicts.js"></script>
<script type="text/babel" src="/Settings.js"></script>
<script type="text/babel" src="/App.js"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.EFTAApp) { return setTimeout(mount, 30); }
    ReactDOM.createRoot(document.getElementById("app-root")).render(<window.EFTAApp />);
  };
  mount();
</script>
</body>
</html>
